server {
    listen 80 default_server;
    listen [::]:80 default_server;

    root /var/www/trackai;
    index index.html;

    server_name _;

    # Размер загружаемых файлов (PDF, видео, DWG и т.д.)
    client_max_body_size 2G;

    # Скачивание установщиков — без SPA fallback
    location /downloads/ {
        alias /var/www/trackai/downloads/;
        add_header Content-Disposition 'attachment';
        add_header Cache-Control 'no-cache';
    }

    # nginx отдаёт видеофайлы напрямую (X-Accel-Redirect из бэкенда)
    location /internal-videos/ {
        internal;
        alias /opt/trackai/backend/videos/;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "private, max-age=0, must-revalidate";
    }

    # Видео-стрим: проксируем к бэкенду, тот возвращает X-Accel-Redirect
    location ~ ^/api/uploaded-video/[^/]+/stream$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api/upload-video/ {
        client_max_body_size 2G;
        proxy_pass http://127.0.0.1:8000/api/upload-video/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_connect_timeout 300s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    # API proxy to backend
    location /api/ {
        client_max_body_size 2G;
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
