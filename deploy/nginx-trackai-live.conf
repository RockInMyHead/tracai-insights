server {
    listen 80;
    server_name trackai.idllm.ru 45.67.57.72;

    client_max_body_size 10G;

    # Установщики — отдельная папка, не затирается при деплое фронта
    location /downloads/ {
        alias /home/user1/downloads/;
        default_type application/octet-stream;
        add_header Content-Disposition 'attachment';
    }

    location / {
        root /home/user1/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    error_page 502 503 504 /maintenance.html;
    location = /maintenance.html {
        root /home/user1/dist;
        internal;
    }

    location /internal-videos/ {
        internal;
        alias /opt/trackai/backend/videos/;
        add_header Accept-Ranges bytes;
        add_header Cache-Control "private, max-age=0, must-revalidate";
    }

    location ~ ^/api/uploaded-video/[^/]+/stream$ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /api/upload-video/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_request_buffering off;
        proxy_buffering off;
        proxy_connect_timeout 300s;
        proxy_send_timeout 3600s;
        proxy_read_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        client_body_timeout 3600s;
        proxy_connect_timeout 300s;
    }
}
