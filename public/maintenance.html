<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Техническое обслуживание - TrackAI</title>
    <style>
        :root {
            --background: 240 10% 3.9%;
            --foreground: 0 0% 98%;
            --primary: 263.4 70% 50.4%;
            --muted: 240 3.7% 15.9%;
            --muted-foreground: 240 5% 64.9%;
            --border: 240 3.7% 15.9%;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: hsl(240 10% 3.9%);
            color: hsl(0 0% 98%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            overflow: hidden;
        }

        .grid-pattern {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(circle, #ffffff05 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.3;
            z-index: -1;
        }

        .glow {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(138, 75, 255, 0.15) 0%, transparent 70%);
            z-index: -1;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
            z-index: 1;
        }

        .logo {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 2rem;
        }

        .logo span {
            background: linear-gradient(135deg, #8A4BFF 0%, #BA94FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h1 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 1rem;
            letter-spacing: -0.025em;
        }

        p {
            color: hsl(240 5% 64.9%);
            font-size: 1.25rem;
            line-height: 1.75rem;
            margin-bottom: 2.5rem;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.875rem;
            margin-bottom: 2rem;
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background-color: #8A4BFF;
            box-shadow: 0 0 10px #8A4BFF;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.5; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(0.95); opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="grid-pattern"></div>
    <div class="glow"></div>
    
    <div class="container">
        <div class="logo">Track<span>AI</span></div>
        
        <div class="badge">
            <div class="dot"></div>
            Технические работы
        </div>
        
        <h1>Мы скоро вернемся</h1>
        <p>
            В данный момент мы проводим плановое техническое обслуживание системы. 
            Пожалуйста, зайдите позже.
        </p>
    </div>
</body>
</html>
